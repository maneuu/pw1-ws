<div class="p-3 border border-gray-200 rounded bg-white shadow-sm cursor-move hover:shadow-md transition" draggable="true" (dragstart)="dragStart.emit(task.id)">

  <div class="flex items-start justify-between gap-2">
    <div class="flex items-center gap-3">
      <span [class]="'w-3 h-3 rounded-full inline-block flex-shrink-0 ' + getProximityColor()"></span>
      <div>
        <div class="font-semibold text-slate-800 text-sm">{{ task.title }}</div>
        <div class="text-xs text-slate-500">Término: {{ task.due }} • {{ getLevelLabel() }}</div>
      </div>
    </div>
    <div class="text-right flex gap-2">
      <button (click)="onEdit()" class="text-xs text-slate-500 hover:text-slate-700">Editar</button>
      <button (click)="onDelete()" class="text-xs text-red-500 hover:text-red-700">Excluir</button>
    </div>
  </div>

  @if (task.desc) {
  <p class="mt-2 text-xs text-slate-600">{{ task.desc }}</p>
  }
</div>
